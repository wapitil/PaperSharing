<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>论文阅读经验库</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <main class="app-shell reader-app">
      <header class="topbar">
        <div>
          <p class="eyebrow">课题组论文阅读沉淀工具</p>
          <h1>论文阅读经验库</h1>
        </div>
        <div class="topbar-actions">
          <div class="user-chip" id="currentUserBox"></div>
          <a class="nav-action" href="./index.html">添加阅读经验</a>
          <a class="nav-action" href="./admin.html">我的管理</a>
        </div>
      </header>

      <section class="reader-library">
        <aside class="paper-list-panel">
          <div class="reader-section-heading">
            <h2>论文</h2>
          </div>
          <label class="field reader-search-field">
            <span>搜索论文</span>
            <input id="paperSearchInput" placeholder="搜索标题、作者、年份" />
          </label>
          <div class="paper-list" id="paperList"></div>
        </aside>

        <section class="paper-detail-panel" id="paperDetail"></section>
      </section>
    </main>

    <script type="module" src="./assets/js/reader.js"></script>
  </body>
</html>
